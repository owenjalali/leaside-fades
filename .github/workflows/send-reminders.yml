name: Send production reminders

on:
  schedule:
    - cron: "0,30 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: production-reminders
  cancel-in-progress: false

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call reminder endpoint
        env:
          CRON_SECRET: ${{ secrets.LEASIDE_REMINDER_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_SECRET:-}" ]; then
            echo "LEASIDE_REMINDER_CRON_SECRET is not configured." >&2
            exit 1
          fi

          response_file="$(mktemp)"
          status_code="$(
            curl \
              --silent \
              --show-error \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              --max-time 60 \
              --retry 2 \
              --retry-all-errors \
              --retry-delay 5 \
              --header "Authorization: Bearer ${CRON_SECRET}" \
              --header "User-Agent: leaside-fades-github-actions-reminder/1.0" \
              --header "X-Scheduler-Source: github-actions" \
              "https://www.leasidefades.com/api/jobs/send-reminders"
          )"

          cat "${response_file}"

          if [ "${status_code}" -lt 200 ] || [ "${status_code}" -ge 300 ]; then
            echo "Reminder endpoint returned HTTP ${status_code}." >&2
            exit 1
          fi

          node -e "const fs = require('fs'); const body = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); if (body.skipped) { console.error('Reminder endpoint skipped instead of running: ' + (body.reason || 'unknown reason')); process.exit(1); } if (!body.ok) { console.error('Reminder endpoint did not report ok=true.'); process.exit(1); }" "${response_file}"
